services:
  mongodb:
    image: mongo:7-jammy
    container_name: mongodb
    ports:
      - "27007:27017"
    volumes:
      - mongodata:/data/db
    environment:
      - MONGO_IDITDB_ROOT_USERNAME=${MONGO_IDITDB_ROOT_USERNAME}
      - MONGO_IDITDB_ROOT_PASSWORD=${MONGO_IDITDB_ROOT_PASSWORD}
    networks:
      - backend

    restart: always

networks:
  backend:


volumes:
  mongodata: